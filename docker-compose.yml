version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: local-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: bt
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: local-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
